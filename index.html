<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>みやぎサーモン 小口販売</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --ocean:       #1a4a6b;
  --ocean-mid:   #2d6a9f;
  --ocean-light: #e8f2fa;
  --ocean-pale:  #f4f9fd;
  --salmon:      #c9614a;
  --salmon-l:    #fdf0ee;
  --sand:        #f4f0e8;
  --text:        #1a2a38;
  --text-mid:    #4a5d6e;
  --text-light:  #8a9baa;
  --border:      #ccd9e4;
  --white:       #ffffff;
  --green:       #2a7a50;
  --green-l:     #e6f4ed;
  --red:         #b83030;
  --red-l:       #fdf0f0;
  --edit-bg:     #fffbea;
  --edit-bd:     #d4a820;
  --radius:      12px;
  --shadow:      0 2px 10px rgba(26,74,107,0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--sand);
  color: var(--text);
  min-height: 100vh;
  font-size: 15px;
}

/* ===== HEADER ===== */
header {
  background: var(--ocean);
  color: white;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 12px;
  box-shadow: 0 2px 12px rgba(26,74,107,0.35);
  position: sticky; top: 0; z-index: 100;
}
.logo { font-family: 'Noto Serif JP', serif; font-size: 1.1rem; font-weight: 700; }
.logo-sub { font-size: 0.72rem; color: rgba(255,255,255,0.6); margin-top: 1px; }
.header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

/* ===== TAB NAV ===== */
.tab-nav {
  display: flex;
  background: var(--ocean);
  border-top: 1px solid rgba(255,255,255,0.1);
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  flex: 1; min-width: 80px;
  padding: 10px 8px;
  background: none; border: none; color: rgba(255,255,255,0.6);
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.78rem; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  border-bottom: 3px solid transparent;
  transition: color 0.15s, border-color 0.15s;
  letter-spacing: 0.03em;
}
.tab-btn.active { color: white; border-bottom-color: #7ec8f0; }
.tab-btn:hover { color: white; }

/* ===== MAIN ===== */
main { max-width: 860px; margin: 0 auto; padding: 20px 14px 40px; }

.page { display: none; }
.page.active { display: block; }

/* ===== CARD ===== */
.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 16px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-head {
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--ocean-light);
  border-bottom: 1px solid var(--border);
}
.card-title {
  font-size: 0.7rem; font-weight: 700;
  letter-spacing: 0.15em; color: var(--ocean); text-transform: uppercase;
}
.card-body { padding: 18px; }

/* ===== FORM ===== */
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
@media (min-width: 600px) {
  .form-grid { grid-template-columns: 140px 1fr 95px 95px 105px; }
}
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label { font-size: 0.68rem; font-weight: 700; color: var(--text-mid); letter-spacing: 0.05em; }

input, select, textarea {
  font-family: 'Noto Sans JP', sans-serif; font-size: 0.95rem;
  border: 1.5px solid var(--border); border-radius: 8px;
  padding: 10px 12px; color: var(--text); background: white;
  transition: border-color 0.15s, box-shadow 0.15s; width: 100%;
  -webkit-appearance: none;
}
input:focus, select:focus, textarea:focus {
  outline: none; border-color: var(--ocean-mid);
  box-shadow: 0 0 0 3px rgba(45,106,159,0.12);
}
input[type="date"] { cursor: pointer; }

.input-wrap { position: relative; }
.input-wrap input { padding-right: 30px; }
.input-unit {
  position: absolute; right: 9px; top: 50%;
  transform: translateY(-50%);
  font-size: 0.7rem; color: var(--text-light); pointer-events: none;
}

.auto-calc {
  background: var(--ocean-light); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  font-size: 0.95rem; color: var(--ocean); font-weight: 700;
  text-align: right; min-height: 42px;
  display: flex; align-items: center; justify-content: flex-end;
}

.form-calc-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-top: 10px; align-items: end;
}
@media (min-width: 600px) {
  .form-calc-row { grid-template-columns: 140px 1fr 95px 95px 105px; }
}

/* ===== BUTTONS ===== */
.btn {
  font-family: 'Noto Sans JP', sans-serif; font-weight: 700;
  border: none; border-radius: 8px; cursor: pointer;
  transition: background 0.15s, transform 0.1s, opacity 0.15s;
  white-space: nowrap; letter-spacing: 0.03em;
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
}
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--ocean); color: white; padding: 11px 20px; font-size: 0.9rem; }
.btn-primary:hover { background: var(--ocean-mid); }
.btn-secondary { background: #e8ecf0; color: var(--text-mid); padding: 11px 16px; font-size: 0.88rem; }
.btn-secondary:hover { background: #dde2e8; }
.btn-danger { background: var(--red-l); color: var(--red); padding: 8px 14px; font-size: 0.82rem; }
.btn-danger:hover { background: #fce4e4; }
.btn-success { background: var(--green-l); color: var(--green); padding: 8px 14px; font-size: 0.82rem; }
.btn-success:hover { background: #d4eddf; }
.btn-icon { background: none; border: none; cursor: pointer; padding: 5px 7px; border-radius: 6px; font-size: 1rem; transition: background 0.15s; }
.btn-icon-edit:hover { background: var(--ocean-light); }
.btn-icon-del:hover  { background: var(--red-l); }
.btn-sm { padding: 7px 14px; font-size: 0.8rem; }
.btn-full { width: 100%; }

.btn-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* 編集モード */
.edit-mode .card-body { background: var(--edit-bg); }
.edit-badge {
  background: var(--edit-bd); color: #6b4800;
  font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
}
.save-ind { font-size: 0.7rem; color: var(--green); opacity: 0; transition: opacity 0.4s; }
.save-ind.on { opacity: 1; }

/* ===== SPINNER ===== */
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: white; border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== TABLE ===== */
.table-toggle {
  padding: 12px 18px;
  display: flex; align-items: center; justify-content: space-between;
  background: var(--ocean-light); border-bottom: 1px solid var(--border);
  cursor: pointer; user-select: none;
}
.table-toggle:hover { background: #daeaf6; }
.rec-count {
  font-size: 0.75rem; color: var(--text-mid);
  background: white; border: 1px solid var(--border);
  border-radius: 20px; padding: 2px 11px;
}
.toggle-arrow { font-size: 0.72rem; color: var(--text-mid); transition: transform 0.2s; }
.toggle-arrow.open { transform: rotate(180deg); }
.table-wrap { max-height: 0; overflow: hidden; transition: max-height 0.35s ease; }
.table-wrap.open { max-height: 4000px; }

.tbl { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.tbl th {
  background: var(--ocean); color: white;
  padding: 8px 10px; text-align: left;
  font-weight: 700; font-size: 0.68rem; letter-spacing: 0.05em;
}
.tbl th.r, .tbl td.r { text-align: right; }
.tbl th.c, .tbl td.c { text-align: center; }
.tbl tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
.tbl tbody tr:last-child { border-bottom: none; }
.tbl tbody tr:hover { background: var(--ocean-pale); }
.tbl tbody tr.editing-row { background: var(--edit-bg) !important; }
.tbl td { padding: 9px 10px; }

/* スマホ用テーブル非表示列 */
@media (max-width: 599px) {
  .hide-sp { display: none; }
}

.badge {
  display: inline-block; font-size: 0.65rem;
  padding: 2px 7px; border-radius: 20px; font-weight: 700;
}
.badge-j { background: #e8f0fa; color: #1a4a9b; }
.badge-d { background: #fae8e8; color: #9b1a1a; }
.badge-s { background: #e8faf0; color: #1a7a4a; }

.show-more {
  text-align: center; padding: 10px;
  border-top: 1px solid var(--border);
  font-size: 0.78rem; color: var(--ocean-mid);
  cursor: pointer; background: #f7fbff;
}
.show-more:hover { background: var(--ocean-light); }

.empty-state { text-align: center; padding: 40px 20px; color: var(--text-light); }
.empty-state .icon { font-size: 2rem; margin-bottom: 8px; }
.empty-state p { font-size: 0.82rem; }

/* ===== 月次集計 ===== */
.sum-grid { display: grid; grid-template-columns: repeat(3,1fr); }
@media (max-width: 500px) { .sum-grid { grid-template-columns: 1fr; } }
.sum-item { padding: 16px 18px; border-right: 1px solid var(--border); }
.sum-item:last-child { border-right: none; }
@media (max-width: 500px) {
  .sum-item { border-right: none; border-bottom: 1px solid var(--border); }
  .sum-item:last-child { border-bottom: none; }
}
.sum-co   { font-size: 0.68rem; font-weight: 700; color: var(--text-mid); margin-bottom: 2px; }
.sum-sub  { font-size: 0.68rem; color: var(--text-light); margin-bottom: 8px; }
.sum-kg   { font-size: 1.3rem; font-weight: 700; color: var(--ocean); font-variant-numeric: tabular-nums; }
.sum-kg .u { font-size: 0.7rem; font-weight: 400; color: var(--text-light); margin-left: 2px; }
.sum-det  { font-size: 0.72rem; color: var(--text-mid); margin-top: 3px; font-variant-numeric: tabular-nums; }

/* ===== カレンダー ===== */
.cal-nav {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 18px; background: var(--ocean-light); border-bottom: 1px solid var(--border);
}
.cal-nav-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 6px;
  padding: 5px 14px; font-size: 0.95rem; cursor: pointer; color: var(--ocean);
  transition: background 0.15s;
}
.cal-nav-btn:hover { background: white; }
.cal-month { font-size: 0.95rem; font-weight: 700; color: var(--ocean); }
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  border-left: 1px solid var(--border); border-top: 1px solid var(--border);
}
.cal-dow {
  text-align: center; padding: 7px 2px;
  font-size: 0.65rem; font-weight: 700; color: var(--text-mid);
  background: #f0f6fb;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
}
.cal-dow.sun { color: #b83030; }
.cal-dow.sat { color: var(--ocean-mid); }
.cal-cell {
  min-height: 64px; padding: 5px 6px;
  border-right: 1px solid var(--border); border-bottom: 1px solid var(--border);
  background: white; vertical-align: top;
}
@media (max-width: 500px) { .cal-cell { min-height: 50px; padding: 4px 4px; } }
.cal-cell.empty { background: #fafafa; }
.cal-cell.has-data { cursor: pointer; }
.cal-cell.has-data:hover { background: var(--ocean-light); }
.cal-cell.selected { background: var(--ocean-light); outline: 2px solid var(--ocean-mid); outline-offset: -2px; }
.cal-cell.today .cal-dn { background: var(--ocean); color: white; border-radius: 50%; }
.cal-dn {
  font-size: 0.75rem; font-weight: 700; color: var(--text);
  width: 20px; height: 20px;
  display: flex; align-items: center; justify-content: center; margin-bottom: 3px;
}
.cal-dn.sun { color: #b83030; }
.cal-dn.sat { color: var(--ocean-mid); }
.cal-kg { font-size: 0.72rem; font-weight: 700; color: var(--ocean); font-variant-numeric: tabular-nums; }
.cal-amt { font-size: 0.62rem; color: var(--salmon); margin-top: 1px; font-variant-numeric: tabular-nums; }
@media (max-width: 500px) { .cal-amt { display: none; } }

/* 日次詳細 */
.day-detail { border-top: 1px solid var(--border); padding: 18px; background: white; display: none; }
.day-detail.open { display: block; }
.day-detail-title {
  font-size: 0.85rem; font-weight: 700; color: var(--ocean);
  margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid var(--ocean-light);
}
.day-cos { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
@media (max-width: 500px) { .day-cos { grid-template-columns: 1fr; } }
.day-co-card { border: 1px solid var(--border); border-radius: 9px; padding: 12px; background: var(--ocean-pale); }
.day-co-card.zero { opacity: 0.35; }
.day-co-name { font-size: 0.65rem; font-weight: 700; color: var(--text-mid); }
.day-co-sub  { font-size: 0.62rem; color: var(--text-light); margin-bottom: 7px; }
.day-co-kg   { font-size: 1.1rem; font-weight: 700; color: var(--ocean); font-variant-numeric: tabular-nums; }
.day-co-kg .u { font-size: 0.68rem; font-weight: 400; color: var(--text-light); }
.day-co-det  { font-size: 0.68rem; color: var(--text-mid); margin-top: 2px; font-variant-numeric: tabular-nums; }
.day-total {
  background: var(--ocean); color: white; border-radius: 9px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-around; gap: 8px;
}
.day-tot-label { font-size: 0.62rem; color: rgba(255,255,255,0.65); margin-bottom: 2px; }
.day-tot-val { font-size: 1.05rem; font-weight: 700; font-variant-numeric: tabular-nums; }

/* ===== ダウンロード ===== */
.dl-row { display: flex; gap: 10px; justify-content: flex-end; align-items: center; padding: 18px 0 4px; flex-wrap: wrap; }
.dl-month { display: flex; align-items: center; gap: 7px; font-size: 0.82rem; color: var(--text-mid); }
.dl-month select { width: auto; padding: 8px 10px; font-size: 0.82rem; }
.btn-dl { background: var(--salmon); color: white; padding: 10px 22px; font-size: 0.88rem; }
.btn-dl:hover { background: #b85540; }

/* ===== 設定ページ ===== */
.setting-section { margin-bottom: 24px; }
.setting-section h3 { font-size: 0.82rem; font-weight: 700; color: var(--ocean); margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid var(--ocean-light); }

.master-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
.master-item {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px; background: var(--ocean-pale);
  border: 1px solid var(--border); border-radius: 8px;
}
.master-item-name { flex: 1; font-size: 0.88rem; }
.master-item-sub  { font-size: 0.72rem; color: var(--text-light); margin-left: 6px; }

.add-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
.add-form .form-group { flex: 1; min-width: 120px; }

.price-item {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  padding: 10px 14px; background: var(--ocean-pale);
  border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px;
}
.price-co-name { font-size: 0.88rem; font-weight: 700; flex: 1; min-width: 140px; }
.price-val { font-size: 1rem; font-weight: 700; color: var(--ocean); min-width: 80px; font-variant-numeric: tabular-nums; }
.price-from { font-size: 0.7rem; color: var(--text-light); }

/* ===== 接続状態 ===== */
.conn-badge {
  font-size: 0.68rem; font-weight: 700; padding: 3px 10px; border-radius: 20px;
  display: flex; align-items: center; gap: 5px;
}
.conn-badge.ok  { background: var(--green-l); color: var(--green); }
.conn-badge.err { background: var(--red-l);   color: var(--red); }
.conn-badge.loading { background: var(--ocean-light); color: var(--ocean); }
.conn-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ===== TOAST ===== */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ocean); color: white;
  padding: 10px 22px; border-radius: 30px;
  font-size: 0.83rem; font-weight: 700;
  box-shadow: 0 4px 20px rgba(26,74,107,0.3);
  transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  z-index: 1000; white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ===== MODAL ===== */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 200;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: white; border-radius: var(--radius); padding: 24px;
  max-width: 420px; width: 100%;
  box-shadow: 0 8px 40px rgba(0,0,0,0.2);
}
.modal h3 { font-size: 1rem; color: var(--ocean); margin-bottom: 14px; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">みやぎサーモン 小口販売</div>
    <div class="logo-sub">雄勝湾支所　阿部優一郎</div>
  </div>
  <div class="header-right">
    <div class="conn-badge loading" id="connBadge">
      <span class="conn-dot"></span><span id="connText">接続中…</span>
    </div>
  </div>
</header>

<nav class="tab-nav">
  <button class="tab-btn active" onclick="showPage('input')">📝 入力</button>
  <button class="tab-btn" onclick="showPage('list')">📋 一覧</button>
  <button class="tab-btn" onclick="showPage('calendar')">📅 カレンダー</button>
  <button class="tab-btn" onclick="showPage('summary')">📊 集計</button>
  <button class="tab-btn" onclick="showPage('settings')">⚙️ 設定</button>
</nav>

<main>

<!-- ========== 入力ページ ========== -->
<div class="page active" id="page-input">

  <div class="card" id="inputCard">
    <div class="card-head">
      <span class="card-title" id="formTitle">新規入力</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="edit-badge" id="editBadge" style="display:none">編集中</span>
        <span class="save-ind" id="saveInd">✓ 保存済み</span>
      </div>
    </div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-group">
          <span class="form-label">日付</span>
          <input type="date" id="inputDate">
        </div>
        <div class="form-group">
          <span class="form-label">納品先（店舗）</span>
          <select id="inputStore" onchange="onStoreChange()">
            <option value="">選択してください</option>
          </select>
        </div>
        <div class="form-group">
          <span class="form-label">数量</span>
          <div class="input-wrap">
            <input type="number" id="inputKg" min="0" step="0.1" placeholder="0" oninput="calcPreview()">
            <span class="input-unit">kg</span>
          </div>
        </div>
        <div class="form-group">
          <span class="form-label">尾数</span>
          <div class="input-wrap">
            <input type="number" id="inputTails" min="0" step="1" placeholder="0" oninput="calcPreview()">
            <span class="input-unit">尾</span>
          </div>
        </div>
        <div class="form-group">
          <span class="form-label">単価（円）</span>
          <div class="input-wrap">
            <input type="number" id="inputPrice" min="0" step="1" placeholder="0" oninput="calcPreview()">
            <span class="input-unit">円</span>
          </div>
        </div>
      </div>
      <div class="form-calc-row">
        <div></div><div></div>
        <div class="form-group">
          <span class="form-label">目回り（自動）</span>
          <div class="auto-calc" id="mawariDisp">—</div>
        </div>
        <div class="form-group">
          <span class="form-label">金額（自動）</span>
          <div class="auto-calc" id="amountDisp">—</div>
        </div>
        <div class="btn-row" style="margin-top:4px">
          <button class="btn btn-primary" id="btnSubmit" onclick="submitRecord()">＋ 追加</button>
          <button class="btn btn-secondary" id="btnCancel" onclick="cancelEdit()" style="display:none">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 直近入力 -->
  <div class="card">
    <div class="table-toggle" onclick="toggleTable('recentWrap','recentArrow')">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="card-title">直近の入力</span>
        <span class="rec-count" id="recentCount">0 件</span>
      </div>
      <span class="toggle-arrow open" id="recentArrow">▼</span>
    </div>
    <div class="table-wrap open" id="recentWrap">

<script>
// ===========================
// 定数
// ===========================
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyJSllmUj4owpklO-9ddVyB0byOTGOSgLTgjRhOK-Uho5xixmLT3t9qKkOvg4VhPKmV/exec';
const STORAGE_KEY = 'ginzake_v2';

// ===========================
// 状態
// ===========================
let records  = [];
let masters  = { companies: [], stores: [], prices: [] };
let editingId = null;
let selectedDate = null;
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth() + 1;
let listShowAll = false;
let pendingDeleteId = null;

// ===========================
// 初期化
// ===========================
window.addEventListener('DOMContentLoaded', async () => {
  const today = new Date();
  document.getElementById('inputDate').value = today.toISOString().slice(0,10);

  // 月セレクト初期化
  ['downloadMonth','summaryMonth','listMonthFilter'].forEach(id => {
    const sel = document.getElementById(id);
    for (let m = 12; m >= 1; m--) {
      const opt = document.createElement('option');
      opt.value = m;
      opt.textContent = `${today.getFullYear()}年 ${m}月`;
      if (m === today.getMonth()+1) opt.selected = true;
      sel.appendChild(opt);
    }
  });

  // ローカルキャッシュから先に表示
  loadLocal();
  renderAll();

  // サーバーから最新データ取得
  await loadFromServer();
});

// ===========================
// ページ切り替え
// ===========================
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  const tabs = ['input','list','calendar','summary','settings'];
  document.querySelectorAll('.tab-btn')[tabs.indexOf(name)].classList.add('active');
  if (name === 'calendar') renderCalendar();
  if (name === 'summary')  renderSummaryPage();
  if (name === 'list')     renderList();
  if (name === 'settings') renderSettings();
}

// ===========================
// ストレージ
// ===========================
function saveLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ records, masters })); } catch(e) {}
}
function loadLocal() {
  try {
    const d = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (d.records) records = d.records;
    if (d.masters && d.masters.companies) masters = d.masters;
  } catch(e) {}
}

// ===========================
// サーバー通信
// ===========================
async function gasPost(payload) {
  const res = await fetch(GAS_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
  });
  return res.json();
}

async function gasGet(params) {
  const url = GAS_URL + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function loadFromServer() {
  setConn('loading', '接続中…');
  try {
    const [recRes, masRes] = await Promise.all([
      gasGet({ action: 'getRecords' }),
      gasGet({ action: 'getMasters' }),
    ]);
    if (recRes.records) records = recRes.records.map(r => ({
      ...r,
      kg:     parseFloat(r.kg)     || 0,
      tails:  parseInt(r.tails)    || 0,
      price:  parseFloat(r.price)  || 0,
      mawari: parseFloat(r.mawari) || 0,
      amount: parseFloat(r.amount) || 0,
    }));
    if (masRes.masters && masRes.masters.companies) masters = masRes.masters;
    saveLocal();
    renderAll();
    setConn('ok', '接続済み');
  } catch(e) {
    setConn('err', 'オフライン');
    showToast('サーバーに接続できません。ローカルデータを使用中。');
  }
}

async function saveMastersToServer() {
  try {
    await gasPost({ action: 'saveMasters', masters });
    saveLocal();
    showToast('設定を保存しました ✓');
  } catch(e) {
    showToast('保存に失敗しました');
  }
}

function setConn(status, text) {
  const badge = document.getElementById('connBadge');
  badge.className = `conn-badge ${status}`;
  document.getElementById('connText').textContent = text;
}

// ===========================
// 単価取得（日付ベース）
// ===========================
function getPriceForCompany(companyKey, dateStr) {
  const applicable = (masters.prices || [])
    .filter(p => p.companyKey === companyKey && p.from <= dateStr)
    .sort((a,b) => b.from.localeCompare(a.from));
  return applicable.length > 0 ? applicable[0].price : 0;
}

// ===========================
// 店舗セレクト構築
// ===========================
function buildStoreSelect() {
  const sel = document.getElementById('inputStore');
  const cur = sel.value;
  sel.innerHTML = '<option value="">選択してください</option>';

  const grouped = {};
  (masters.stores || []).forEach(s => {
    if (!grouped[s.companyKey]) grouped[s.companyKey] = [];
    grouped[s.companyKey].push(s);
  });

  (masters.companies || []).forEach(c => {
    const stores = grouped[c.key] || [];
    if (stores.length === 0) return;
    const grp = document.createElement('optgroup');
    grp.label = c.name;
    stores.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.key;
      opt.textContent = s.name;
      grp.appendChild(opt);
    });
    sel.appendChild(grp);
  });

  if (cur) sel.value = cur;
}

// ===========================
// フォームイベント
// ===========================
function onStoreChange() {
  const storeKey = document.getElementById('inputStore').value;
  const dateStr  = document.getElementById('inputDate').value;
  if (storeKey && editingId === null) {
    const store = (masters.stores || []).find(s => s.key === storeKey);
    if (store) {
      const price = getPriceForCompany(store.companyKey, dateStr || new Date().toISOString().slice(0,10));
      document.getElementById('inputPrice').value = price;
    }
  }
  calcPreview();
}

function calcPreview() {
  const kg    = parseFloat(document.getElementById('inputKg').value)    || 0;
  const tails = parseInt  (document.getElementById('inputTails').value) || 0;
  const price = parseFloat(document.getElementById('inputPrice').value) || 0;
  document.getElementById('mawariDisp').textContent = (kg>0&&tails>0) ? (kg/tails).toFixed(1) : '—';
  document.getElementById('amountDisp').textContent = (kg>0&&price>0) ? Math.round(kg*price).toLocaleString()+'円' : '—';
}

// ===========================
// 追加 / 更新
// ===========================
async function submitRecord() {
  const date  = document.getElementById('inputDate').value;
  const storeKey = document.getElementById('inputStore').value;
  const kg    = parseFloat(document.getElementById('inputKg').value);
  const tails = parseInt  (document.getElementById('inputTails').value);
  const price = parseFloat(document.getElementById('inputPrice').value);

  if (!date)            { showToast('日付を入力してください'); return; }
  if (!storeKey)        { showToast('納品先を選んでください'); return; }
  if (!kg || kg<=0)     { showToast('数量を入力してください'); return; }
  if (!tails||tails<=0) { showToast('尾数を入力してください'); return; }
  if (!price||price<=0) { showToast('単価を入力してください'); return; }

  const store   = (masters.stores || []).find(s => s.key === storeKey) || {};
  const company = (masters.companies || []).find(c => c.key === store.companyKey) || {};

  const rec = {
    date, storeKey, storeName: store.name || storeKey,
    company: store.companyKey || '', companyName: company.name || '',
    kg, tails, price,
    mawari: Math.round(kg/tails*10)/10,
    amount: Math.round(kg*price),
  };

  const btn = document.getElementById('btnSubmit');
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  try {
    if (editingId !== null) {
      const res = await gasPost({ action: 'updateRecord', id: editingId, ...rec });
      if (res.success) {
        const idx = records.findIndex(r => String(r.id) === String(editingId));
        if (idx >= 0) records[idx] = { ...rec, id: editingId };
        showToast('更新しました ✓');
      } else { showToast('更新に失敗しました'); }
    } else {
      const res = await gasPost({ action: 'addRecord', ...rec });
      if (res.id) {
        records.push({ ...rec, id: res.id });
        showToast('追加しました ✓');
      } else { showToast('追加に失敗しました'); }
    }
    saveLocal();
    flashSave();
    resetForm();
    renderAll();
  } catch(e) {
    showToast('通信エラーが発生しました');
  } finally {
    btn.innerHTML = editingId !== null ? '✓ 更新' : '＋ 追加';
    btn.disabled = false;
  }
}

// ===========================
// 編集
// ===========================
function startEdit(id) {
  const r = records.find(r => String(r.id) === String(id));
  if (!r) return;
  editingId = String(id);
  document.getElementById('inputDate').value  = r.date;
  document.getElementById('inputStore').value = r.storeKey;
  document.getElementById('inputKg').value    = r.kg;
  document.getElementById('inputTails').value = r.tails;
  document.getElementById('inputPrice').value = r.price;
  calcPreview();
  document.getElementById('formTitle').textContent   = '編集';
  document.getElementById('editBadge').style.display = 'inline';
  document.getElementById('btnSubmit').textContent   = '✓ 更新';
  document.getElementById('btnCancel').style.display = 'inline';
  document.getElementById('inputCard').classList.add('edit-mode');
  showPage('input');
  document.getElementById('inputCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
  renderAll();
}

function cancelEdit() { resetForm(); renderAll(); }

function resetForm() {
  editingId = null;
  // 日付は保持
  document.getElementById('inputStore').value = '';
  document.getElementById('inputKg').value    = '';
  document.getElementById('inputTails').value = '';
  document.getElementById('inputPrice').value = '';
  document.getElementById('mawariDisp').textContent = '—';
  document.getElementById('amountDisp').textContent = '—';
  document.getElementById('formTitle').textContent   = '新規入力';
  document.getElementById('editBadge').style.display = 'none';
  document.getElementById('btnSubmit').textContent   = '＋ 追加';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('inputCard').classList.remove('edit-mode');
}

// ===========================
// 削除
// ===========================
function askDelete(id) {
  const r = records.find(r => String(r.id) === String(id));
  if (!r) return;
  pendingDeleteId = String(id);
  const d = new Date(r.date);
  document.getElementById('deleteModalMsg').textContent =
    `${d.getMonth()+1}/${d.getDate()} ${r.storeName} ${r.kg}kg のデータを削除しますか？`;
  document.getElementById('deleteModal').classList.add('open');
}
function closeDeleteModal() {
  pendingDeleteId = null;
  document.getElementById('deleteModal').classList.remove('open');
}
async function confirmDelete() {
  closeDeleteModal();
  if (!pendingDeleteId) return;
  const id = pendingDeleteId;
  try {
    const res = await gasPost({ action: 'deleteRecord', id });
    if (res.success) {
      records = records.filter(r => String(r.id) !== String(id));
      if (String(editingId) === String(id)) resetForm();
      saveLocal();
      renderAll();
      showToast('削除しました');
    } else { showToast('削除に失敗しました'); }
  } catch(e) { showToast('通信エラーが発生しました'); }
}

// ===========================
// 全体描画
// ===========================
function renderAll() {
  buildStoreSelect();
  renderRecent();
  renderInputSummary();
  renderCalendar();
}

// ===========================
// 直近テーブル（入力ページ）
// ===========================
function renderRecent() {
  const sorted = [...records].sort((a,b) => String(b.date).localeCompare(String(a.date)) || String(b.id).localeCompare(String(a.id)));
  const recent = sorted.slice(0, 5);
  document.getElementById('recentCount').textContent = records.length + ' 件';
  document.getElementById('recentContainer').innerHTML = buildTableHTML(recent, true);
}

// ===========================
// 一覧ページ
// ===========================
function renderList() {
  const month = parseInt(document.getElementById('listMonthFilter').value);
  const year  = new Date().getFullYear();
  const ms    = `${year}-${String(month).padStart(2,'0')}`;
  const filtered = records.filter(r => String(r.date).startsWith(ms));
  const sorted   = [...filtered].sort((a,b) => String(a.date).localeCompare(String(b.date)) || String(a.id).localeCompare(String(b.id)));

  document.getElementById('listCount').textContent = sorted.length + ' 件';

  const display = listShowAll ? sorted : sorted.slice(-10).reverse();
  document.getElementById('listContainer').innerHTML = buildTableHTML(display, false);

  const moreBtn = document.getElementById('listShowMore');
  if (sorted.length > 10) {
    moreBtn.style.display = 'block';
    moreBtn.textContent = listShowAll ? '▲ 直近10件のみ表示' : `▼ 全${sorted.length}件を表示`;
  } else {
    moreBtn.style.display = 'none';
  }
}
function toggleListAll() { listShowAll = !listShowAll; renderList(); }

function buildTableHTML(rows, compact) {
  if (rows.length === 0) {
    return `<div class="empty-state"><div class="icon">🐟</div><p>データがありません</p></div>`;
  }
  let html = `<div style="overflow-x:auto"><table class="tbl"><thead><tr>
    <th>日付</th><th>納品先</th><th class="hide-sp">請求先</th>
    <th class="r">kg</th><th class="r hide-sp">尾数</th>
    <th class="r hide-sp">目回り</th><th class="r hide-sp">単価</th><th class="r">金額</th>
    <th class="c">操作</th>
  </tr></thead><tbody>`;

  rows.forEach(r => {
    const co  = (masters.companies||[]).find(c=>c.key===r.company) || {};
    const dateStr = String(r.date).replace(/-/g,'/').replace(/^\d{4}\//,'');
    const cls = String(r.id) === String(editingId) ? ' class="editing-row"' : '';
    const badgeCls = r.company==='jyumonji'?'badge-j':r.company==='dai'?'badge-d':'badge-s';
    html += `<tr${cls}>
      <td>${dateStr}</td>
      <td>${r.storeName||'—'}</td>
      <td class="hide-sp"><span class="badge ${badgeCls}">${co.name||r.company||'—'}</span></td>
      <td class="r">${(r.kg||0).toLocaleString()}</td>
      <td class="r hide-sp">${r.tails||0}</td>
      <td class="r hide-sp">${r.mawari||0}</td>
      <td class="r hide-sp">${(r.price||0).toLocaleString()}</td>
      <td class="r">${(r.amount||0).toLocaleString()}</td>
      <td class="c" style="white-space:nowrap">
        <button class="btn-icon btn-icon-edit" onclick="startEdit('${r.id}')" title="編集">✏️</button>
        <button class="btn-icon btn-icon-del"  onclick="askDelete('${r.id}')" title="削除">✕</button>
      </td>
    </tr>`;
  });
  html += '</tbody></table></div>';
  return html;
}

// ===========================
// 集計（入力ページ）
// ===========================
function renderInputSummary() {
  const today = new Date();
  const ms = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}`;
  renderSummaryGrid('inputSummary', ms);
}

// ===========================
// 集計ページ
// ===========================
function renderSummaryPage() {
  const month = parseInt(document.getElementById('summaryMonth').value);
  const year  = new Date().getFullYear();
  const ms    = `${year}-${String(month).padStart(2,'0')}`;
  renderSummaryGrid('summaryGrid', ms);
  renderDailyTable(ms);
}

function renderSummaryGrid(elId, monthStr) {
  const g = {};
  (masters.companies||[]).forEach(c => { g[c.key] = {kg:0,tails:0,amount:0}; });
  records.filter(r => String(r.date).startsWith(monthStr)).forEach(r => {
    if (!g[r.company]) g[r.company] = {kg:0,tails:0,amount:0};
    g[r.company].kg     += parseFloat(r.kg)||0;
    g[r.company].tails  += parseInt(r.tails)||0;
    g[r.company].amount += parseFloat(r.amount)||0;
  });

  const el = document.getElementById(elId);
  if (!el) return;
  if ((masters.companies||[]).length === 0) {
    el.innerHTML = '<div style="padding:16px;font-size:0.82rem;color:var(--text-light)">取引先が登録されていません</div>';
    return;
  }
  el.innerHTML = (masters.companies||[]).map(c => {
    const d = g[c.key] || {kg:0,tails:0,amount:0};
    const stores = (masters.stores||[]).filter(s=>s.companyKey===c.key).map(s=>s.name).join('・');
    return `<div class="sum-item">
      <div class="sum-co">${c.name}</div>
      <div class="sum-sub">${stores||'—'}</div>
      <div class="sum-kg">${d.kg.toLocaleString()}<span class="u">kg</span></div>
      <div class="sum-det">${d.tails}尾　／　${d.amount.toLocaleString()}円</div>
    </div>`;
  }).join('');
}

function renderDailyTable(monthStr) {
  const dayMap = {};
  records.filter(r => String(r.date).startsWith(monthStr)).forEach(r => {
    const dt = String(r.date);
    if (!dayMap[dt]) dayMap[dt] = {kg:0,tails:0,amount:0};
    dayMap[dt].kg     += parseFloat(r.kg)||0;
    dayMap[dt].tails  += parseInt(r.tails)||0;
    dayMap[dt].amount += parseFloat(r.amount)||0;
  });
  const dates = Object.keys(dayMap).sort();
  if (dates.length === 0) {
    document.getElementById('dailyTableContainer').innerHTML =
      '<div class="empty-state"><div class="icon">📅</div><p>データがありません</p></div>';
    return;
  }
  let html = `<div style="overflow-x:auto"><table class="tbl"><thead><tr>
    <th>日付</th><th class="r">数量(kg)</th><th class="r">尾数</th><th class="r">金額(円)</th>
  </tr></thead><tbody>`;
  dates.forEach(dt => {
    const d = new Date(dt);
    const dow = ['日','月','火','水','木','金','土'][d.getDay()];
    const v = dayMap[dt];
    html += `<tr>
      <td>${d.getMonth()+1}/${d.getDate()}（${dow}）</td>
      <td class="r">${v.kg.toLocaleString()}</td>
      <td class="r">${v.tails}</td>
      <td class="r">${v.amount.toLocaleString()}</td>
    </tr>`;
  });
  // 合計行
  const totKg = dates.reduce((s,dt)=>s+dayMap[dt].kg,0);
  const totTl = dates.reduce((s,dt)=>s+dayMap[dt].tails,0);
  const totAm = dates.reduce((s,dt)=>s+dayMap[dt].amount,0);
  html += `<tr style="background:var(--ocean-light);font-weight:700">
    <td>合計</td><td class="r">${totKg.toLocaleString()}</td>
    <td class="r">${totTl}</td><td class="r">${totAm.toLocaleString()}</td>
  </tr>`;
  html += '</tbody></table></div>';
  document.getElementById('dailyTableContainer').innerHTML = html;
}

// ===========================
// カレンダー
// ===========================
function calPrev() { calMonth--; if(calMonth<1){calMonth=12;calYear--;} selectedDate=null; renderCalendar(); }
function calNext() { calMonth++; if(calMonth>12){calMonth=1;calYear++;} selectedDate=null; renderCalendar(); }

function renderCalendar() {
  document.getElementById('calMonthLabel').textContent = `${calYear}年 ${calMonth}月`;
  const ms = `${calYear}-${String(calMonth).padStart(2,'0')}`;
  const todayStr = new Date().toISOString().slice(0,10);

  const dayMap = {};
  records.filter(r => String(r.date).startsWith(ms)).forEach(r => {
    const dt = String(r.date);
    if (!dayMap[dt]) dayMap[dt] = {};
    (masters.companies||[]).forEach(c => { if (!dayMap[dt][c.key]) dayMap[dt][c.key]={kg:0,tails:0,amount:0}; });
    if (!dayMap[dt][r.company]) dayMap[dt][r.company]={kg:0,tails:0,amount:0};
    dayMap[dt][r.company].kg     += parseFloat(r.kg)||0;
    dayMap[dt][r.company].tails  += parseInt(r.tails)||0;
    dayMap[dt][r.company].amount += parseFloat(r.amount)||0;
  });

  const firstDow = new Date(calYear, calMonth-1, 1).getDay();
  const lastDate = new Date(calYear, calMonth, 0).getDate();
  const dows = ['日','月','火','水','木','金','土'];

  let html = dows.map((d,i) =>
    `<div class="cal-dow ${i===0?'sun':i===6?'sat':''}">${d}</div>`
  ).join('');

  for (let i=0; i<firstDow; i++) html += `<div class="cal-cell empty"></div>`;

  for (let d=1; d<=lastDate; d++) {
    const dt  = `${calYear}-${String(calMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(calYear, calMonth-1, d).getDay();
    const data = dayMap[dt];
    const hasData = !!data;
    const totKg = hasData ? Object.values(data).reduce((s,v)=>s+(v.kg||0),0) : 0;
    const totAm = hasData ? Object.values(data).reduce((s,v)=>s+(v.amount||0),0) : 0;
    const cls = ['cal-cell',hasData?'has-data':'',dt===todayStr?'today':'',dt===selectedDate?'selected':''].filter(Boolean).join(' ');
    const onclick = hasData ? `onclick="selectDay('${dt}')"` : '';
    const dowCls  = dow===0?'sun':dow===6?'sat':'';
    html += `<div class="${cls}" ${onclick}>
      <div class="cal-dn ${dowCls}">${d}</div>
      ${hasData?`<div class="cal-kg">${totKg.toLocaleString()}kg</div><div class="cal-amt">${totAm.toLocaleString()}円</div>`:''}
    </div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  if (selectedDate && dayMap[selectedDate]) {
    renderDayDetail(selectedDate, dayMap[selectedDate]);
  } else {
    document.getElementById('dayDetail').classList.remove('open');
  }
}

function selectDay(dt) {
  if (selectedDate === dt) { selectedDate=null; document.getElementById('dayDetail').classList.remove('open'); renderCalendar(); return; }
  selectedDate = dt;
  renderCalendar();
}

function renderDayDetail(dt, data) {
  const d = new Date(dt);
  const dow = ['日','月','火','水','木','金','土'][d.getDay()];
  document.getElementById('dayDetailTitle').textContent = `${d.getMonth()+1}月${d.getDate()}日（${dow}）の集計`;

  const cosHtml = (masters.companies||[]).map(c => {
    const g = data[c.key] || {kg:0,tails:0,amount:0};
    const stores = (masters.stores||[]).filter(s=>s.companyKey===c.key).map(s=>s.name).join('・');
    const zero = g.kg === 0;
    return `<div class="day-co-card ${zero?'zero':''}">
      <div class="day-co-name">${c.name}</div>
      <div class="day-co-sub">${stores||'—'}</div>
      <div class="day-co-kg">${(g.kg||0).toLocaleString()}<span class="u">kg</span></div>
      <div class="day-co-det">${g.tails||0}尾　／　${(g.amount||0).toLocaleString()}円</div>
    </div>`;
  }).join('');
  document.getElementById('dayCos').innerHTML = cosHtml;

  const totKg = Object.values(data).reduce((s,v)=>s+(v.kg||0),0);
  const totTl = Object.values(data).reduce((s,v)=>s+(v.tails||0),0);
  const totAm = Object.values(data).reduce((s,v)=>s+(v.amount||0),0);
  document.getElementById('dayTotal').innerHTML = `
    <div class="day-tot-item"><div class="day-tot-label">合計 数量</div><div class="day-tot-val">${totKg.toLocaleString()} kg</div></div>
    <div class="day-tot-item"><div class="day-tot-label">合計 尾数</div><div class="day-tot-val">${totTl} 尾</div></div>
    <div class="day-tot-item"><div class="day-tot-label">合計 金額</div><div class="day-tot-val">${totAm.toLocaleString()} 円</div></div>
  `;
  document.getElementById('dayDetail').classList.add('open');
}

// ===========================
// テーブル開閉
// ===========================
function toggleTable(wrapId, arrowId) {
  const wrap  = document.getElementById(wrapId);
  const arrow = document.getElementById(arrowId);
  const open  = wrap.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

// ===========================
// 設定ページ
// ===========================
function renderSettings() {
  renderCompanyList();
  renderStoreList();
  renderPriceList();
}

function renderCompanyList() {
  const el = document.getElementById('companyList');
  el.innerHTML = (masters.companies||[]).map(c => `
    <div class="master-item">
      <span class="master-item-name">${c.name}</span>
      <button class="btn btn-danger btn-sm" onclick="removeCompany('${c.key}')">削除</button>
    </div>`).join('') || '<div style="font-size:0.8rem;color:var(--text-light)">登録なし</div>';

  // 店舗追加フォームの会社セレクト更新
  const sel = document.getElementById('newStoreCompany');
  sel.innerHTML = (masters.companies||[]).map(c=>`<option value="${c.key}">${c.name}</option>`).join('');
}

function renderStoreList() {
  document.getElementById('storeList').innerHTML = (masters.stores||[]).map(s => {
    const co = (masters.companies||[]).find(c=>c.key===s.companyKey);
    return `<div class="master-item">
      <span class="master-item-name">${s.name}<span class="master-item-sub">→ ${co?co.name:'不明'}</span></span>
      <button class="btn btn-danger btn-sm" onclick="removeStore('${s.key}')">削除</button>
    </div>`;
  }).join('') || '<div style="font-size:0.8rem;color:var(--text-light)">登録なし</div>';
}

function renderPriceList() {
  const el = document.getElementById('priceList');
  el.innerHTML = (masters.companies||[]).map(c => {
    const current = getPriceForCompany(c.key, new Date().toISOString().slice(0,10));
    return `<div class="price-item">
      <span class="price-co-name">${c.name}</span>
      <span class="price-val">${current.toLocaleString()}円</span>
      <span class="price-from">現在の単価</span>
      <button class="btn btn-success btn-sm" onclick="openPriceModal('${c.key}','${c.name}',${current})">変更</button>
    </div>`;
  }).join('') || '<div style="font-size:0.8rem;color:var(--text-light)">取引先を先に登録してください</div>';
}

function addCompany() {
  const name = document.getElementById('newCompanyName').value.trim();
  if (!name) { showToast('会社名を入力してください'); return; }
  const key = 'co_' + Date.now();
  masters.companies.push({ key, name });
  document.getElementById('newCompanyName').value = '';
  renderSettings();
  showToast(`${name} を追加しました`);
}

function removeCompany(key) {
  masters.companies = masters.companies.filter(c => c.key !== key);
  masters.stores    = masters.stores.filter(s => s.companyKey !== key);
  masters.prices    = masters.prices.filter(p => p.companyKey !== key);
  renderSettings();
  buildStoreSelect();
}

function addStore() {
  const name       = document.getElementById('newStoreName').value.trim();
  const companyKey = document.getElementById('newStoreCompany').value;
  if (!name)       { showToast('店舗名を入力してください'); return; }
  if (!companyKey) { showToast('請求先を選んでください'); return; }
  const key = 'st_' + Date.now();
  masters.stores.push({ key, name, companyKey });
  document.getElementById('newStoreName').value = '';
  renderSettings();
  buildStoreSelect();
  showToast(`${name} を追加しました`);
}

function removeStore(key) {
  masters.stores = masters.stores.filter(s => s.key !== key);
  renderSettings();
  buildStoreSelect();
}

// 単価変更
let priceTargetKey = null;
function openPriceModal(companyKey, companyName, currentPrice) {
  priceTargetKey = companyKey;
  const today = new Date().toISOString().slice(0,10);
  const html = `
    <div style="margin-bottom:12px">
      <strong>${companyName}</strong> の単価を変更します
    </div>
    <div style="display:grid;gap:10px">
      <div class="form-group">
        <span class="form-label">新しい単価（円）</span>
        <div class="input-wrap"><input type="number" id="newPriceVal" value="${currentPrice}" min="0" step="1"><span class="input-unit">円</span></div>
      </div>
      <div class="form-group">
        <span class="form-label">適用開始日</span>
        <input type="date" id="newPriceFrom" value="${today}">
      </div>
    </div>`;
  document.querySelector('#deleteModal .modal').innerHTML = `
    <h3>単価の変更</h3>${html}
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">キャンセル</button>
      <button class="btn btn-primary" onclick="applyPriceChange()">適用</button>
    </div>`;
  document.getElementById('deleteModal').classList.add('open');
}

function applyPriceChange() {
  const price = parseFloat(document.getElementById('newPriceVal').value);
  const from  = document.getElementById('newPriceFrom').value;
  if (!price || price <= 0) { showToast('単価を入力してください'); return; }
  if (!from) { showToast('適用開始日を入力してください'); return; }
  masters.prices.push({ companyKey: priceTargetKey, price, from });
  closeDeleteModal();
  // モーダルのHTMLを元に戻す
  document.querySelector('#deleteModal .modal').innerHTML = `
    <h3>削除の確認</h3>
    <p style="font-size:0.88rem;color:var(--text-mid)" id="deleteModalMsg"></p>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeDeleteModal()">キャンセル</button>
      <button class="btn btn-danger" onclick="confirmDelete()">削除する</button>
    </div>`;
  renderSettings();
  showToast(`${from} から ${price.toLocaleString()}円 に変更しました`);
}

// ===========================
// Excelダウンロード
// ===========================
function downloadExcel() {
  const month = parseInt(document.getElementById('downloadMonth').value);
  const year  = new Date().getFullYear();
  const ms    = `${year}-${String(month).padStart(2,'0')}`;
  const target = records.filter(r => String(r.date).startsWith(ms));
  if (target.length === 0) { showToast(`${month}月のデータはありません`); return; }

  const sorted  = [...target].sort((a,b) => String(a.date).localeCompare(String(b.date)));
  const lastDay = new Date(year, month, 0).getDate();

  const rows = [];
  rows.push(['', '雄勝湾支所 阿部優一郎 ギンザケ小口販売状況', '', '', '', '', `${year}/${month}/${lastDay}`]);
  rows.push(['', '', '', '', '', '', '太協物産（株）']);
  rows.push([]);
  rows.push(['', '日付', '販売先', '数量（kg）', '単価（円）', '尾数', '目回り']);
  sorted.forEach(r => {
    const d = new Date(r.date);
    rows.push(['', `${d.getMonth()+1}/${d.getDate()}`, r.companyName||r.company, r.kg, r.price, r.tails, r.mawari]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:4},{wch:10},{wch:24},{wch:12},{wch:12},{wch:10},{wch:10}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, `${month}月`);
  XLSX.writeFile(wb, `雄勝湾支所_阿部優一郎_ギンザケ小口販売状況_${year}${String(month).padStart(2,'0')}.xlsx`);
  showToast(`${month}月分をダウンロードしました ✓`);
}

// ===========================
// ユーティリティ
// ===========================
function flashSave() {
  const el = document.getElementById('saveInd');
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 2000);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2400);
}
</script>
